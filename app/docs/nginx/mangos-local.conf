server {
    listen 80;
    server_name mangos.ima-wiseutils.com;

    access_log /var/log/nginx/mangos/access-app.log;
    error_log /var/log/nginx/mangos/error-app.log;

    root /home/imanol/projects/wiseutils/pay-trackr/app;
    index index.php;

    # Block internal directories and files
    location ^~ /includes/  { deny all; }
    location ^~ /pages/     { deny all; }
    location ^~ /docs/      { deny all; }
    location = /router.php  { deny all; }

    # Static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Front controller
    location / {
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ \.php$ {
        deny all;
    }
}
