<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#FFFBF5">
    <title>Sin conexión — mangos</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: #FFFBF5;
            color: #292524;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .wrap { max-width: 360px; }
        svg.logo {
            width: 56px;
            height: 76px;
            color: #D97706;
            display: block;
            margin: 0 auto 1.5rem;
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 .5rem; }
        p { color: #8C857D; font-size: .9rem; margin: 0 0 1.5rem; line-height: 1.5; }
        button {
            background: #D97706;
            color: white;
            border: 0;
            border-radius: .5rem;
            padding: .65rem 1.25rem;
            font: inherit;
            font-weight: 500;
            cursor: pointer;
        }
        button:active { transform: scale(.97); }
    </style>
</head>
<body>
    <div class="wrap">
        <svg class="logo" viewBox="0 0 140 190" fill="none">
            <path d="M 70 30 C 108 30, 122 70, 122 100 C 122 138, 106 160, 85 172 C 74 178, 62 170, 52 158 C 35 138, 18 118, 18 95 C 18 65, 35 30, 70 30 Z"
                  stroke="currentColor" stroke-width="5"/>
        </svg>
        <h1>Sin conexión</h1>
        <p>No pudimos cargar esta página. Volvé a intentar cuando tengas internet.</p>
        <button onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
