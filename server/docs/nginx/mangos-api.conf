# ── mangos API rate limiting zones ────────────────
# IMPORTANT: These must be placed in the http {} block of nginx.conf,
# NOT inside a server block.
limit_req_zone $binary_remote_addr zone=mangos_api:10m rate=40r/m;
limit_conn_zone $binary_remote_addr zone=mangos_api_conn:10m;

server {
    server_name mangos-api.wiseutils.com;

    access_log /var/log/nginx/mangos/access-api.log;
    error_log /var/log/nginx/mangos/error-api.log;

    root /var/www/pay-trackr/server/api;
    index index.php;

    # ── Connection limit (15 per IP) ──────────────
    limit_conn mangos_api_conn 15;
    limit_conn_status 429;

    # ── Block scanner paths (drop connection) ─────
    location ~* \.(env|git|sql|bak|log|ini|yml|yaml|toml|conf|cfg)$ { return 444; }
    location ~* ^/(\.env|\.git|\.aws|\.docker|\.github|\.vscode) { return 444; }
    location ~* ^/(wp-|wordpress|xmlrpc|admin\.php) { return 444; }
    location ~* ^/(docker|kubernetes|production|config|secrets)/ { return 444; }
    location ~* ^/(RSC|cgi-bin|vendor|node_modules)/ { return 444; }
    location ~* ^/(phpinfo|phpmyadmin|adminer|wp-login) { return 444; }

    # Block internal files
    location = /config.php { deny all; }

    # ── API — rate limited front controller ───────
    location / {
        limit_req zone=mangos_api burst=15 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;
    }

    # Only index.php is executable
    location = /index.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 180s;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block all other PHP files
    location ~ \.php$ {
        deny all;
    }

    # ── SSL (Cloudflare Origin Certificate) ──────
    listen 443 ssl;
    ssl_certificate /etc/ssl/cloudflare/wiseutils.pem;
    ssl_certificate_key /etc/ssl/cloudflare/wiseutils.key;

    # Redirect HTTP to HTTPS
    listen 80;
    if ($scheme = http) { return 301 https://$host$request_uri; }
}
